name: CI-Linux

on: [push, pull_request, merge_group]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: docs - stable - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }

      - name: Install dependencies
        shell: bash
        run: |
          rustc --version
          cargo --version
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev

      - name: Format Check
        shell: bash
        run: cargo fmt --all -- --check

      - name: Clippy Check
        shell: bash
        run: cargo clippy --workspace --all-features --bins --examples --tests --benches -- -D warnings

      - name: Test Doc Build
        shell: bash
        # Make sure this list matches the members list in Cargo.toml
        run: |
          for package in geozero geozero-cli geozero-bench; do
            (echo "----- Testing doc build for package $package ----" && cargo doc -p $package --all-features --no-deps)
          done
        env:
          RUSTDOCFLAGS: "-D warnings"

  test:
    name: tests - stable - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }

      - name: Install dependencies
        shell: bash
        run: |
          rustc --version
          cargo --version
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev

      - name: Tests
        shell: bash
        run: |
          cargo test -p geozero
          cargo test -p geozero --no-default-features
          cargo test --workspace --all-features

      - name: Set up PostgreSQL with PostGIS
        uses: nyurik/action-setup-postgis@228cfe4dd41aad01801a0bdc767040e5024fff1d # v2
        with:
          username: ci
          password: ci
          database: test
          rights: --superuser
          port: 34837
        id: pg

      - name: PostGIS tests
        shell: bash
        run: |
          psql -P pager=off -v ON_ERROR_STOP=1 -f geozero/tests/data/postgis.sql $DATABASE_URL
          cargo test -p geozero --all-features -- --ignored postgis --test-threads 1
        env:
          DATABASE_URL: "${{ steps.pg.outputs.connection-uri }}?sslmode=disable"

  coverage:
    name: coverage - stable - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }

      - name: Install dependencies
        shell: bash
        run: |
          rustc --version
          cargo --version
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev gdal-bin

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0

      - name: Set up PostgreSQL with PostGIS
        uses: nyurik/action-setup-postgis@228cfe4dd41aad01801a0bdc767040e5024fff1d # v2
        with:
          username: ci
          password: ci
          database: test
          rights: --superuser
          port: 34837
        id: pg

      - name: Prepare benchmark data
        shell: bash
        # The benches run against the small committed subsets in CI (CI=true):
        # the in-repo countries.fgb and buildings sample. Derive the shp/gpkg and
        # load the PostGIS tables the benches read.
        run: |
          psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS postgis"
          ogr2ogr -f PostgreSQL "PG:$DATABASE_URL" \
            geozero/tests/data/countries.fgb \
            -nln countries -lco GEOMETRY_NAME=geom -nlt PROMOTE_TO_MULTI
          sample=geozero-bench/tests/data/osm-buildings-3857-ch-sample
          ogr2ogr -f "ESRI Shapefile" -lco SPATIAL_INDEX=YES "$sample.shp" "$sample.fgb"
          ogr2ogr -f GPKG -nln buildings "$sample.gpkg" "$sample.fgb"
          ogr2ogr -f PostgreSQL "PG:$DATABASE_URL" "$sample.fgb" \
            -nln buildings -lco GEOMETRY_NAME=geom -nlt PROMOTE_TO_MULTI
        env:
          DATABASE_URL: "${{ steps.pg.outputs.connection-uri }}?sslmode=disable"

      - name: Install cargo-llvm-cov
        shell: bash
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        shell: bash
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --all-targets --all-features --include-build-script --codecov --output-path target/llvm-cov/codecov.info
        env:
          DATABASE_URL: "${{ steps.pg.outputs.connection-uri }}?sslmode=disable"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: target/llvm-cov/codecov.info
          fail_ci_if_error: false
          
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { persist-credentials: false }

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          # Report inline annotations instead of uploading SARIF, so the job needs
          # no security-events: write and works for pull requests from forks.
          advanced-security: false
          annotations: true

  # This final step is needed to mark the whole workflow as successful
  # Don't change its name - it is used by the merge protection rules
  done:
    name: stable - x86_64-unknown-linux-gnu
    runs-on: ubuntu-latest
    needs: [ lint, test, zizmor ]
    if: always()
    permissions: {}
    steps:
      - name: Result of the needed steps
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: echo "$NEEDS_JSON"
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        name: CI Result
        run: exit 1
